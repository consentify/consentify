name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: test (node ${{ matrix.node }})
    strategy:
      matrix:
        node: [20, 22, 24]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: pnpm/action-setup@v4
      - run: pnpm install
      - run: pnpm -r build
      - run: pnpm -r check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm size
