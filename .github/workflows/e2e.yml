name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6

      - run: pnpm install

      - run: pnpm --filter @consentify/core build

      - run: npx playwright install --with-deps chromium

      - run: pnpm e2e
