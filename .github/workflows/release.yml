name: release

on:
  push:
    tags:
      - 'core-v*'
      - 'react-v*'
      - 'create-consentify-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: git merge-base --is-ancestor ${{ github.sha }} origin/main
      # No registry-url here: setup-node would write an _authToken line into
      # .npmrc, and even an empty NODE_AUTH_TOKEN overrides the OIDC flow.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm -r install
      - run: pnpm -r build
      - run: pnpm -r check
      - run: pnpm test
      - run: pnpm size
      # Publishing uses npm trusted publishing (OIDC), configured on
      # npmjs.com per package: repo consentify/consentify, workflow
      # release.yml, no environment. No NPM_TOKEN involved; provenance is
      # generated automatically. pnpm 10+ performs the OIDC exchange natively.
      - name: Publish core
        if: startsWith(github.ref, 'refs/tags/core-v')
        run: pnpm --filter @consentify/core publish --access public --no-git-checks
      - name: Publish react
        if: startsWith(github.ref, 'refs/tags/react-v')
        run: pnpm --filter @consentify/react publish --access public --no-git-checks
      - name: Publish create-consentify
        if: startsWith(github.ref, 'refs/tags/create-consentify-v')
        run: pnpm --filter create-consentify publish --access public --no-git-checks
