name: release

on:
  push:
    tags:
      - 'core-v*'
      - 'react-v*'
      - 'create-consentify-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: git merge-base --is-ancestor ${{ github.sha }} origin/main
      # No registry-url here: setup-node would write an _authToken line into
      # .npmrc, and even an empty NODE_AUTH_TOKEN overrides the OIDC flow.
      # Node 24 bundles npm >= 11.5.1, required for trusted publishing.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
      - run: pnpm -r install
      - run: pnpm -r build
      - run: pnpm -r check
      - run: pnpm test
      - run: pnpm size
      # Publishing uses npm trusted publishing (OIDC), configured on
      # npmjs.com per package: repo consentify/consentify, workflow
      # release.yml, no environment. No NPM_TOKEN involved; provenance is
      # generated automatically. Pack with pnpm (rewrites `workspace:^`),
      # publish the tarball with npm (>= 11.5.1 performs the OIDC exchange).
      - name: Publish core
        if: startsWith(github.ref, 'refs/tags/core-v')
        run: |
          cd packages/core
          pnpm pack
          npm publish ./*.tgz --access public
      - name: Publish react
        if: startsWith(github.ref, 'refs/tags/react-v')
        run: |
          cd packages/react
          pnpm pack
          npm publish ./*.tgz --access public
      - name: Publish create-consentify
        if: startsWith(github.ref, 'refs/tags/create-consentify-v')
        run: |
          cd packages/create-consentify
          pnpm pack
          npm publish ./*.tgz --access public
