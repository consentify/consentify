<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Consentify E2E Test</title>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			padding: 1rem;
		}
		button {
			padding: 0.5rem 1rem;
			margin-right: 0.5rem;
			cursor: pointer;
		}
		#status {
			margin-top: 1rem;
			padding: 1rem;
			background: #f0f0f0;
			border-radius: 4px;
			font-family: monospace;
		}
	</style>
</head>
<body>
	<h1>Consentify E2E Test</h1>
	<div>
		<button id="accept">Accept All</button>
		<button id="reject">Reject All</button>
		<button id="clear">Clear</button>
	</div>
	<div id="status">Loading...</div>

	<script src="/consentify.iife.min.js"></script>
	<script>
		const consent = Consentify.createConsentify({
			policy: {
				categories: ['analytics', 'marketing'],
			},
		});

		window.consent = consent;

		const statusEl = document.getElementById('status');

		function updateStatus() {
			const state = consent.get();
			if (state.decision === 'unset') {
				statusEl.textContent = 'unset';
			} else {
				const parts = ['decided'];
				for (const cat of ['analytics', 'marketing']) {
					parts.push(`${cat}:${consent.isGranted(cat)}`);
				}
				statusEl.textContent = parts.join(' ');
			}
		}

		consent.subscribe(updateStatus);
		updateStatus();

		document.getElementById('accept').addEventListener('click', () => consent.acceptAll());
		document.getElementById('reject').addEventListener('click', () => consent.rejectAll());
		document.getElementById('clear').addEventListener('click', () => consent.clear());

		window.consentReady = true;
	</script>
</body>
</html>
